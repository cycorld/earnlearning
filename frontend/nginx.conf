server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # PWA update strategy (#018, #026):
    #
    # All entry points and Service Worker files MUST never be cached at any
    # layer (browser, host nginx, Cloudflare, etc.). Hashed /assets/* remain
    # immutable so the CDN does its job for static content.
    #
    # Why `always` on add_header: nginx only applies add_header to 2xx/3xx
    # responses by default, which means 304 Not Modified responses (the most
    # common case after the first load) would lose their Cache-Control
    # header entirely. `always` fixes that.
    #
    # Why CDN-Cache-Control: belt-and-suspenders for Cloudflare. Cloudflare
    # honors this header explicitly and will not store the response.

    # SPA fallback — serves /index.html for any client-side route.
    # Specific locations below take precedence over this one.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }

    # Explicit /index.html — in case something requests it by path directly
    # (e.g. curl during health checks, or a browser that didn't get the SPA
    # redirect). Same headers as the fallback.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }

    # Service Worker — Workbox-generated precache manifest + runtime.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # Custom push-notification handler imported by sw.js via importScripts.
    location = /sw-push.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # Workbox runtime library — filename changes with the workbox version,
    # but we still force no-cache so older clients pick up new URLs
    # referenced by fresh sw.js immediately.
    location ~* ^/workbox-[^/]+\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # vite-plugin-pwa registration stub loaded from index.html.
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # PWA manifest — brand/meta/icons source; never cache.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # Non-hashed icons and favicons — revalidate each load.
    location ~* ^/(favicon|apple-touch-icon|pwa-|icons\.svg) {
        add_header Cache-Control "no-cache" always;
    }

    # Hashed static assets — safe to cache forever because Vite embeds a
    # content hash in the filename. New deploys produce new filenames.
    # (Using add_header directly so we don't emit a duplicate Cache-Control
    # from `expires`.)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
