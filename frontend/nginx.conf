server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # HTML files: always revalidate (ensures latest JS bundle references)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Favicon & PWA icons: revalidate (not hashed by Vite)
    location ~* ^/(favicon|apple-touch-icon|pwa-) {
        add_header Cache-Control "no-cache";
    }

    # Hashed static assets: cache forever (Vite adds content hash to filenames)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker: never cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
