  /oauth/token:
    post:
      consumes:
      - application/json
      description: |-
        인가 코드 → 액세스 토큰 교환, 또는 리프레시 토큰으로 갱신.

        **PKCE (RFC 7636) 퍼블릭 클라이언트** 는 `client_secret` 없이 `code_verifier` 만으로 교환 가능.
        **refresh_token** grant 도 PKCE 로 발급된 토큰이면 `client_secret` 옵셔널.
        응답 (RFC 6749 §5.1): `access_token`, `refresh_token`, `token_type` (Bearer), `expires_in` (초), `scopes`.
      parameters:
      - description: 토큰 교환/갱신 요청
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_interfaces_http_handler.OAuthTokenRequest'
