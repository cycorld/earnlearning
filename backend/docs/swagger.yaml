host: earnlearning.com
info:
  contact: {}
  description: 이화여대 창업 교육 LMS API
  title: EarnLearning LMS API
  version: "1.0"
paths:
  /admin/classrooms/{id}/dashboard:
    get:
      description: '관리자용: 클래스룸 멤버 활동 대시보드'
      parameters:
      - description: 클래스룸 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 클래스룸 대시보드
      tags:
      - Admin
  /admin/companies:
    get:
      description: '관리자용: 모든 회사 목록 조회'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 전체 회사 목록
      tags:
      - Admin
  /admin/force-reload:
    post:
      consumes:
      - application/json
      description: |-
        관리자용: WebSocket 으로 모든 클라이언트에 force_reload 이벤트를 브로드캐스트해
        구버전 PWA 를 새 버전으로 강제 전환시킨다. Rate limit: 1회/분.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
        "429":
          description: 1분 간격 제한
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
        "503":
          description: WS hub 미설정
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 전체 접속 클라이언트 강제 새로고침 (#027)
      tags:
      - Admin
  /admin/grants:
    post:
      consumes:
      - application/json
      description: '관리자용: 새 정부과제 생성'
      parameters:
      - description: 과제 정보
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_interfaces_http_handler.CreateGrantRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 정부과제 생성
      tags:
      - Admin
  /admin/grants/{id}/approve/{appId}:
    post:
      description: '관리자용: 정부과제 지원 승인'
      parameters:
      - description: 과제 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 지원 ID
        in: path
        name: appId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 정부과제 지원 승인
      tags:
      - Admin
  /admin/grants/{id}/close:
    post:
      description: '관리자용: 정부과제 종료'
      parameters:
      - description: 과제 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 정부과제 종료
      tags:
      - Admin
  /admin/grants/{id}/revoke/{appId}:
    post:
      description: '관리자용: 승인된 지원을 취소하고 보상금을 회수'
      parameters:
      - description: 과제 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 지원 ID
        in: path
        name: appId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 정부과제 승인 취소
      tags:
      - Admin
  /admin/loans:
    get:
      description: '관리자용: 전체 대출 목록 조회'
      parameters:
      - description: 상태 필터
        in: query
        name: status
        type: string
      - description: 페이지
        in: query
        name: page
        type: integer
      - description: 크기
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 전체 대출 목록
      tags:
      - Admin
  /admin/loans/{id}/approve:
    put:
      consumes:
      - application/json
      description: '관리자용: 대출 신청 승인'
      parameters:
      - description: 대출 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 승인 조건
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_interfaces_http_handler.ApproveLoanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 대출 승인
      tags:
      - Admin
  /admin/loans/{id}/reject:
    put:
      description: '관리자용: 대출 신청 거절'
      parameters:
      - description: 대출 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 대출 거절
      tags:
      - Admin
  /admin/loans/weekly-interest:
    post:
      description: '관리자용: 전체 대출 주간 이자 처리'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 주간 이자 처리
      tags:
      - Admin
  /admin/notifications/announce:
    post:
      consumes:
      - application/json
      description: '관리자용: 공지 알림 전송 (전체 또는 특정 사용자)'
      parameters:
      - description: 공지 정보
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_interfaces_http_handler.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 공지 알림 전송
      tags:
      - Admin
  /admin/tasks:
    get:
      description: '관리자용: 칸반 태스크 목록 조회'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      security:
      - BearerAuth: []
      summary: 태스크 목록
