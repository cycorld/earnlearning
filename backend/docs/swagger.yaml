      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.OAuthTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_interfaces_http_handler.APIResponse'
      summary: 토큰 교환
      tags:
      - OAuth
