upstream earnlearning-prod {
    include /etc/nginx/earnlearning-active-slot.conf;
}

server {
    listen 80;
    server_name earnlearning.com www.earnlearning.com;

    client_max_body_size 50M;

    # SSE 스트리밍 (#072 / #085 핫픽스)
    # 정규식 location 으로 ask/stream 만 정확히 매칭. prefix `location /api/chat/sessions/`
    # 를 쓰면 nginx 가 `/api/chat/sessions` (no trailing) 요청을 trailing slash 추가하려고
    # 301 redirect 를 발행 → 브라우저 Mixed Content 차단 (#085).
    location ~ ^/api/chat/sessions/[^/]+/ask/stream$ {
        proxy_pass http://earnlearning-prod;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
    }

    location / {
        proxy_pass http://earnlearning-prod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name stage.earnlearning.com;

    client_max_body_size 50M;

    location ~ ^/api/chat/sessions/[^/]+/ask/stream$ {
        # SSE 스트리밍 (#072 / #085)
        proxy_pass http://127.0.0.1:8182;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 180s;
    }

    location / {
        proxy_pass http://127.0.0.1:8182;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
