services:
  backend:
    image: ghcr.io/cycorld/earnlearning-backend:${IMAGE_TAG:-latest}
    restart: always
    volumes:
      - prod_db:/data/db
      - prod_uploads:/data/uploads
      - ../tasks:/data/tasks:ro
    environment:
      - DB_PATH=/data/db/earnlearning.db
      - UPLOAD_PATH=/data/uploads
      - TASKS_PATH=/data/tasks
    env_file: .env.prod
    # 호스트의 PG 서버(포트 5432)에 DDL 용 admin 연결을 하기 위해 host-gateway 추가
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - blue

  frontend:
    image: ghcr.io/cycorld/earnlearning-frontend:${IMAGE_TAG:-latest}
    restart: always
    networks:
      - blue

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8180:80"
    volumes:
      - ./nginx-app.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - blue

volumes:
  prod_db:
    name: earnlearning-prod_prod_db
    external: true
  prod_uploads:
    name: earnlearning-prod_prod_uploads
    external: true

networks:
  blue:
