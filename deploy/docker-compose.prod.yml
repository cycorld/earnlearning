version: '3.8'
services:
  backend:
    build:
      context: ../backend
      args:
        - BUILD_NUMBER=${BUILD_NUMBER:-dev}
        - COMMIT_SHA=${COMMIT_SHA:-local}
    restart: always
    volumes:
      - prod_db:/data/db
      - prod_uploads:/data/uploads
      - ../tasks:/data/tasks:ro
    environment:
      - DB_PATH=/data/db/earnlearning.db
      - UPLOAD_PATH=/data/uploads
      - TASKS_PATH=/data/tasks
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:cyc@ewha.ac.kr}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@ewha.ac.kr}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SES_REGION=${SES_REGION:-ap-northeast-2}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - SES_FROM_EMAIL=${SES_FROM_EMAIL:-noreply@earnlearning.com}
    networks:
      - prod

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=/api
        - VITE_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
        - BUILD_NUMBER=${BUILD_NUMBER:-dev}
        - COMMIT_SHA=${COMMIT_SHA:-local}
    restart: always
    networks:
      - prod

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx-app.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - prod

volumes:
  prod_db:
    external:
      name: earnlearning-prod_prod_db
  prod_uploads:
    external:
      name: earnlearning-prod_prod_uploads

networks:
  prod:
